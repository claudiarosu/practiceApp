name: Daily Architect Rollout

on:
  schedule:
    - cron: '0 9 * * *' # 9:00 AM daily
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  rollout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Daily Rollout
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_CLI_TRUST_WORKSPACE: true
        run: node scripts/daily-rollout.cjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: daily auto-rollout"
          title: "Daily Feature Rollout"
          body: "This PR was automatically generated by the Architect's Pulse workflow."
          branch: daily-feature-rollout
          base: main
